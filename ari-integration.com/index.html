<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex"> <!-- Prevents search engine indexing -->
    <title>Ari Integration</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        body {
            background-color: #1a1a1a; /* Darker gray-black to match the header */
            color: #d1d1d1; /* Light gray text for contrast, slightly toned down */
            min-height: 100vh;
            margin: 0; /* Remove default margin */
            padding-top: 250px; /* Add padding to push content below the fixed header */
        }
        .header-img {
            position: fixed; /* Fix the header to the top */
            top: 0;
            left: 0;
            width: 100%; /* Stretch across the entire screen */
            height: 150px; /* Fixed height to match the header image proportions */
            object-fit: cover; /* Ensure the image scales properly without distortion */
            z-index: 1000; /* Ensure the header stays above other content */
        }
        /* Make the height responsive using viewport units */
        @media (max-width: 1100px) {
            .header-img {
                height: 13vw; /* Height scales with viewport width */
                /* min-height: 100px; Minimum height to avoid it getting too small */
                max-height: 150px; /* Maximum height to match your original design */
            }
        }
        /* Make the height responsive using viewport units */
        @media (max-width: 768px) {
            .header-img {
                height: 13vw; /* Height scales with viewport width */
                /* min-height: 100px; Minimum height to avoid it getting too small */
                max-height: 150px; /* Maximum height to match your original design */
            }
        }
        /* Adjust padding-top on body for smaller screens */
        @media (max-width: 768px) {
            body {
                padding-top: 20vw; /* Match the header height */
                min-height: calc(100vh); /* Ensure content isn’t cut off */
            }
        }
        .notice-container {
            background-color: #2b2b2b; /* Slightly lighter than body to match header depth */
            border-radius: 10px;
            padding: 2rem;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
            max-width: 600px;
            width: 80%; /* Responsive width */
            margin: 0 auto; /* Center the container */
            text-align: center;
        }
        h1 {
            color: #ffffff; /* Pure white for the heading to match the header text */
            font-size: 1.75rem;
            margin-bottom: 1.5rem;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
        }
        a {
            color: #ff4d4d; /* Red to match the "Ari" in the header */
            text-decoration: none;
        }
        a:hover {
            color: #ff6666; /* Lighter red on hover */
            text-decoration: underline;
        }
        .highlight {
            color: #ffffff; /* White for emphasis, matching the header */
        }
    </style>
</head>
<body>
    <!-- Header Image -->
    <img src="header.png" alt="Ari Integration- Header" class="header-img">

    <!-- Notice Content -->
    <div class="container notice-container">
        <h1>Notice:<br>Ari Integration Has Closed</h1>
        <p>Effective <span class="highlight">January 31, 2025</span>, Ari Integration is no longer in operation. We sincerely thank our clients and partners for their support over the years. Thank you for your understanding.</p>
        <p>This domain is no longer actively monitored.</p>
    </div>

    <!-- Bootstrap 5 JS (optional, for responsiveness features) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
